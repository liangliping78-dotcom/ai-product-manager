<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 漫剧 APP UI 原型</title>
    <style>
        :root {
            --bg: #06070a;
            --bg-soft: #0d0f16;
            --card: rgba(255, 255, 255, 0.06);
            --card-strong: rgba(255, 255, 255, 0.1);
            --stroke: rgba(255, 255, 255, 0.1);
            --text: rgba(255, 255, 255, 0.94);
            --text-soft: rgba(213, 218, 238, 0.72);
            --text-faint: rgba(175, 182, 210, 0.46);
            --cyan: #2ed8ff;
            --pink: #ff63d7;
            --violet: #8959ff;
            --gold: #ffbf6b;
            --green: #69e59c;
            --danger: #ff7676;
            --shadow: 0 28px 80px rgba(0, 0, 0, 0.56);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --device-base-width: 390px;
            --device-base-height: 844px;
            --device-scale: 1.5;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, rgba(31, 196, 221, 0.18), transparent 34%),
                radial-gradient(circle at 88% 20%, rgba(255, 99, 215, 0.14), transparent 30%),
                radial-gradient(circle at 78% 74%, rgba(137, 89, 255, 0.14), transparent 28%),
                linear-gradient(180deg, #090b11 0%, #05060a 100%);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            width: 30vw;
            height: 30vw;
            border-radius: 999px;
            filter: blur(90px);
            pointer-events: none;
            opacity: 0.75;
            z-index: 0;
        }

        body::before {
            top: -10vw;
            left: -10vw;
            background: rgba(46, 216, 255, 0.16);
        }

        body::after {
            right: -8vw;
            bottom: -12vw;
            background: rgba(255, 99, 215, 0.14);
        }

        button,
        textarea {
            font: inherit;
        }

        button {
            border: 0;
            background: none;
            color: inherit;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        textarea {
            resize: none;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
        }

        .page-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            margin: 0 auto;
            padding: 28px 0 36px;
        }

        .prototype-board {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .device-wrap {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 18px 0 28px;
            min-height: calc(var(--device-base-height) * var(--device-scale));
            overflow: visible;
        }

        .device {
            position: relative;
            width: var(--device-base-width);
            height: var(--device-base-height);
            padding: 12px;
            border-radius: 46px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.03)),
                linear-gradient(180deg, #111521, #04060c);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.62);
            transform: scale(var(--device-scale));
            transform-origin: top center;
        }

        .device::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 38px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        .device-screen {
            position: relative;
            height: 100%;
            overflow: hidden;
            border-radius: 36px;
            background:
                radial-gradient(circle at 18% 12%, rgba(46, 216, 255, 0.1), transparent 30%),
                radial-gradient(circle at 82% 12%, rgba(255, 99, 215, 0.08), transparent 28%),
                linear-gradient(180deg, #10131c 0%, #090b11 24%, #06070b 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .dynamic-island {
            position: absolute;
            top: 10px;
            left: 50%;
            width: 132px;
            height: 34px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.88);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            z-index: 12;
        }

        .status-bar {
            position: relative;
            z-index: 11;
            height: 50px;
            padding: 14px 22px 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 7px;
            color: rgba(255, 255, 255, 0.8);
        }

        .status-icons span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 16px;
        }

        .status-speed {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            min-width: 34px;
            line-height: 1;
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.82);
        }

        .status-speed small {
            margin-top: 3px;
            font-size: 7px;
            letter-spacing: 0.02em;
            opacity: 0.88;
        }

        .status-battery {
            min-width: 28px;
            height: 18px;
            padding: 0 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.92);
            color: rgba(0, 0, 0, 0.88);
            font-size: 10px;
            font-weight: 900;
            line-height: 1;
        }

        .screen-stack {
            position: absolute;
            inset: 50px 0 90px;
        }

        .screen-stack.is-studio {
            inset: 50px 0 0;
        }

        .screen {
            position: absolute;
            inset: 0;
            padding: 18px 18px 28px;
            overflow-y: auto;
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
        }

        .screen.is-active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .studio-screen {
            padding: 0;
            overflow: hidden;
            background: #06070b;
            display: flex;
            flex-direction: column;
        }

        .studio-topbar {
            height: 44px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            background: linear-gradient(180deg, rgba(8, 10, 16, 0.96), rgba(8, 10, 16, 0.76));
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .studio-frame {
            width: 100%;
            flex: 1;
            border: 0;
            display: block;
            background: #06070b;
        }

        .studio-back-fab {
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(7, 10, 17, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.16);
            color: rgba(244, 247, 255, 0.96);
            font-size: 12px;
            font-weight: 800;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.34);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .topbar-left {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-badge,
        .back-badge {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #ffbf6b, #ff4fc4 42%, #6f74ff 100%);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
            color: rgba(255, 255, 255, 0.95);
            font-size: 18px;
            font-weight: 800;
        }

        .back-badge {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: none;
            font-size: 20px;
        }

        .topbar-copy {
            min-width: 0;
        }

        .topbar-kicker {
            display: block;
            font-size: 11px;
            color: var(--text-faint);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .topbar-title {
            display: block;
            margin-top: 4px;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .topbar-sub {
            display: block;
            margin-top: 3px;
            font-size: 12px;
            color: var(--text-soft);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .points-pill,
        .menu-pill,
        .small-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.86);
            font-size: 12px;
            font-weight: 800;
            backdrop-filter: blur(16px);
        }

        .points-pill strong {
            color: rgba(255, 255, 255, 0.96);
        }

        .small-pill {
            min-height: 30px;
            padding: 0 12px;
            font-size: 11px;
        }

        .card {
            position: relative;
            padding: 18px;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(20px);
        }

        .hero-card {
            padding: 22px;
            border-radius: 28px;
            background:
                radial-gradient(circle at 18% 16%, rgba(46, 216, 255, 0.16), transparent 34%),
                radial-gradient(circle at 84% 24%, rgba(255, 99, 215, 0.14), transparent 26%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.3);
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(214, 241, 255, 0.9);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .hero-card h2 {
            margin: 16px 0 8px;
            font-size: 34px;
            line-height: 1.04;
            letter-spacing: -0.06em;
        }

        .hero-card p {
            margin: 0;
            color: var(--text-soft);
            font-size: 14px;
            line-height: 1.7;
        }

        .hero-meta {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mode-switch {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 6px;
            border-radius: 24px;
            background: rgba(12, 15, 24, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .mode-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 18px;
            text-align: left;
            color: rgba(255, 255, 255, 0.62);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
        }

        .mode-btn:hover {
            transform: translateY(-1px);
        }

        .mode-btn.is-active {
            border-color: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.96);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.22);
        }

        .mode-btn.is-active[data-mode="quick"] {
            background: linear-gradient(135deg, rgba(118, 76, 133, 0.34), rgba(173, 89, 149, 0.3));
            border-color: rgba(198, 119, 175, 0.34);
            box-shadow: 0 0 0 1px rgba(198, 119, 175, 0.1) inset, 0 12px 24px rgba(88, 42, 96, 0.24);
        }

        .mode-btn.is-active[data-mode="pro"] {
            background: linear-gradient(135deg, rgba(56, 82, 148, 0.4), rgba(73, 62, 136, 0.34));
            border-color: rgba(103, 126, 214, 0.34);
            box-shadow: 0 0 0 1px rgba(103, 126, 214, 0.1) inset, 0 12px 24px rgba(34, 47, 102, 0.28);
        }

        .mode-btn-ico {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 15px;
            flex: 0 0 auto;
        }

        .mode-btn.is-active .mode-btn-ico {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.14);
            color: rgba(255, 255, 255, 0.98);
        }

        .mode-btn-copy strong {
            display: block;
            font-size: 14px;
        }

        .mode-btn-copy span {
            display: none;
        }

        .composer {
            margin-top: 16px;
        }

        .section-space {
            margin-top: 16px;
        }

        .label-row,
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .section-head h3,
        .label-row strong {
            margin: 0;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .section-head span,
        .label-row span {
            color: var(--text-faint);
            font-size: 12px;
        }

        .subject-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .subject-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.84);
            font-size: 12px;
            font-weight: 700;
        }

        .subject-chip::before {
            content: "@";
            color: var(--cyan);
        }

        .prompt-area {
            width: 100%;
            height: 155px;
            padding: 12px 12px 58px;
            border-radius: 22px;
            background: rgba(8, 10, 15, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
            outline: none;
            line-height: 1.6;
            font-size: 10px;
            font-weight: 350;
        }

        .prompt-area::placeholder {
            color: rgba(255, 255, 255, 0.28);
        }

        .prompt-area:focus {
            border-color: rgba(46, 216, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(46, 216, 255, 0.08);
        }

        .prompt-count {
            position: absolute;
            right: 18px;
            bottom: 18px;
            color: var(--text-faint);
            font-size: 12px;
            font-weight: 700;
        }

        .pill-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            padding-bottom: 2px;
            overflow-x: auto;
            scroll-snap-type: x proximity;
        }

        .tool-pill {
            scroll-snap-align: start;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: max-content;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.86);
            font-size: 12px;
            font-weight: 700;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .tool-pill:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .tool-pill-icon {
            width: 22px;
            height: 22px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.88);
            font-size: 11px;
        }

        .cta-row {
            margin-top: 14px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
            gap: 10px;
        }

        .ghost-btn,
        .primary-btn,
        .secondary-btn,
        .outline-btn {
            min-height: 50px;
            padding: 0 16px;
            border-radius: 18px;
            font-weight: 800;
            letter-spacing: -0.01em;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .ghost-btn:hover,
        .primary-btn:hover,
        .secondary-btn:hover,
        .outline-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        .ghost-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.88);
        }

        .outline-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.88);
        }

        .primary-btn {
            background: linear-gradient(135deg, #ffbf6b 0%, #ff68c2 40%, #775bff 100%);
            color: rgba(255, 255, 255, 0.98);
            box-shadow: 0 20px 30px rgba(119, 91, 255, 0.24);
        }

        .secondary-btn {
            background: linear-gradient(135deg, rgba(46, 216, 255, 0.18), rgba(137, 89, 255, 0.2));
            border: 1px solid rgba(46, 216, 255, 0.24);
            color: rgba(255, 255, 255, 0.94);
        }

        .create-home {
            padding: 10px 12px 18px;
            color: rgba(255, 255, 255, 0.96);
            background:
                radial-gradient(circle at 72% -10%, rgba(32, 123, 104, 0.34), transparent 32%),
                radial-gradient(circle at 16% 8%, rgba(39, 82, 87, 0.26), transparent 28%),
                linear-gradient(180deg, #081b1f 0%, #070d10 38%, #040506 100%);
        }

        .create-hero-panel {
            position: relative;
            min-height: 226px;
            padding: 4px 10px 8px;
            border-radius: 26px;
            overflow: hidden;
            background:
                radial-gradient(circle at 80% 12%, rgba(32, 150, 101, 0.22), transparent 20%),
                linear-gradient(135deg, #0f4747 0%, #08292b 54%, #051417 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .create-hero-panel::before,
        .create-hero-panel::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            border: 1px solid rgba(210, 245, 233, 0.09);
            pointer-events: none;
        }

        .create-hero-panel::before {
            width: 238px;
            height: 238px;
            left: -154px;
            top: 34px;
            opacity: 0.28;
        }

        .create-hero-panel::after {
            width: 194px;
            height: 194px;
            right: -108px;
            top: 24px;
            opacity: 0.22;
        }

        .create-hero-main {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 6px;
            margin-top: 0;
        }

        .create-copy {
            flex: 0 0 116px;
            width: 116px;
            max-width: 116px;
            padding-top: 18px;
        }

        .create-title {
            margin: 0;
            color: transparent;
            font-family: "STKaiti", "KaiTi", "Songti SC", "STSong", serif;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.06;
            letter-spacing: 0.02em;
            background: linear-gradient(180deg, #fffdf7 0%, #f2f4ee 58%, #dbe7de 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-stroke: 0.22px rgba(255, 255, 255, 0.08);
            text-shadow:
                0 1px 0 rgba(255, 255, 255, 0.05),
                0 6px 14px rgba(0, 0, 0, 0.16),
                0 0 10px rgba(191, 228, 214, 0.03);
            white-space: nowrap;
        }

        .create-subtitle {
            margin-top: 8px;
            color: rgba(229, 236, 232, 0.62);
            font-size: 9px;
            font-weight: 700;
            line-height: 1.6;
            letter-spacing: 0.1em;
        }

        .create-stars {
            margin-top: 10px;
            color: rgba(247, 250, 246, 0.74);
            font-size: 11px;
            letter-spacing: 0.14em;
        }

        .create-figure-stack {
            position: relative;
            width: 160px;
            height: 126px;
            flex: 0 0 auto;
        }

        .create-figure-stack::before {
            content: "";
            position: absolute;
            left: 106px;
            top: 0;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: rgba(199, 255, 134, 0.9);
            box-shadow: 0 0 16px rgba(199, 255, 134, 0.4);
        }

        .create-figure-card {
            position: absolute;
            overflow: hidden;
            width: 52px;
            height: 94px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.22);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0)),
                var(--figure-image, none) var(--figure-position, center center) / cover no-repeat,
                var(--portrait-bg, linear-gradient(180deg, rgba(35, 63, 126, 0.9), rgba(16, 20, 31, 0.98)));
        }

        .create-figure-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(14, 18, 22, 0), rgba(14, 18, 22, 0.28));
            opacity: 0.36;
        }

        .create-figure-card::after {
            content: "";
            position: absolute;
            inset: 0;

        function formatVoiceFileSize(size) {
            if (!Number.isFinite(size) || size <= 0) return "";
            const mb = size / (1024 * 1024);
            if (mb >= 0.1) return `${mb.toFixed(1)}M`;
            const kb = size / 1024;
            return `${Math.max(1, Math.round(kb))}K`;
        }

        function formatVoiceDuration(seconds) {
            if (!Number.isFinite(seconds) || seconds <= 0) return "01:26";
            const totalSeconds = Math.floor(seconds);
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
        }

                    if (!state.subjectSelectedIndexes.length) {
                        state.subjectBulkMode = false;
                        render();
                        break;

                    state.subjectSelectedIndexes
                        .slice()
                        .sort((a, b) => b - a)
                        .forEach((index) => {
                            if (index >= 0 && index < subjectLibraryItems.length) subjectLibraryItems.splice(index, 1);

                    state.subjectSelectedIndexes = [];
                    state.subjectBulkMode = false;
                    render();
                    showToast(`已删除 ${removedCount} 个主体`);
                    break;
                case "toggle-subject-select": {
                    const index = Number(payload);
                    if (!Number.isInteger(index)) break;
                    state.subjectBulkMode = true;
                    state.subjectSelectedIndexes = state.subjectSelectedIndexes.includes(index)
                        ? state.subjectSelectedIndexes.filter((item) => item !== index)
                        : [...state.subjectSelectedIndexes, index];

                "纸伞旧梦",

            ];
            const orderMap = new Map(preferredOrder.map((title, index) => [title, index]));
            const homeImageOverrides = {
                "不该知道的真相": {
                    image: `${sharedAssetRoot}/style-4.png`,
                    position: "54% 24%"
                },
                "看不见的老头": {
                    image: `${sharedAssetRoot}/style-6.png`,
                    position: "56% 22%"

                "山村诡事": {
                    image: `${sharedAssetRoot}/inspiration-bottom.png`,
                    position: "center center"
                }
            };
            const filtered = inspirations
                .filter((item) => state.inspirationFilter === "all" || item.genre === state.inspirationFilter)
                .slice()
                .sort((a, b) => (orderMap.get(a.title) ?? 999) - (orderMap.get(b.title) ?? 999));
            return filtered.map((item, orderIndex) => {
                const index = inspirations.indexOf(item);
                const layoutClass = orderIndex === 1 ? "is-home-tall" : "";
                const showPlay = item.mode === "quick";

                    `--sample-cover:${item.cover}`,
                    `--sample-image:${homeImage?.image ? `url('${homeImage.image}')` : item.image ? `url('${item.image}')` : "none"}`,
                    `--sample-position:${homeImage?.position || item.position || "center"}`
                ].join(";");
                return `
                    <button class="create-poster ${layoutClass}" style="${posterStyle}" data-open-sheet="sample" data-sample-index="${index}" type="button">

            }

            return `
                <div class="sheet-scrim ${isOpen ? "is-visible" : ""}" data-close-sheet></div>
                <div class="bottom-sheet ${isOpen ? "is-open" : ""} ${state.sheet && state.sheet.type === "spec" ? "is-spec-sheet" : ""}">
                    ${state.sheet && state.sheet.type === "spec" ? "" : `
                    <div class="sheet-handle"></div>
                    <div class="sheet-head">
                        <div>
                            <strong>${title}</strong>
                            <span>${desc}</span>
                        </div>
                        <button class="sheet-close" data-close-sheet type="button">×</button>
                    </div>
                    `}
                    <div class="sheet-body">${body}</div>
                </div>
            `;
        }

        function renderApp() {
            deviceRoot.innerHTML = `
                <div class="dynamic-island"></div>
                <div class="status-bar">
                    <span>15:24</span>
                    <div class="status-icons">
                        <span class="status-speed">2.25<small>MB/s</small></span>
                        <span>▲</span>
                        <span>◔</span>
                        <span>▮</span>
                        <span class="status-battery">89</span>
                    </div>
                </div>
                <div class="screen-stack ${state.route === "studio" ? "is-studio" : ""}">
                    ${renderHome()}
                    ${renderPro()}
                    ${renderQuick()}
                    ${renderAssets()}
                    ${renderSubjects()}
                    ${renderVoices()}
                    ${renderProfile()}
                    ${renderStudio()}
                </div>
                ${renderTabbar()}
                ${renderSheet()}
                <div class="toast ${state.toast ? "is-visible" : ""}">${escapeHtml(state.toast)}</div>
            `;
            syncSummary();
        }

        function render() {
            renderApp();
        }

        document.addEventListener("click", (event) => {
            const target = event.target instanceof Element ? event.target : null;
            if (state.inspirationFilterOpen && target && !target.closest(".create-genre-select-wrap")) {
                state.inspirationFilterOpen = false;
                render();
            }
            if (state.voiceLangOpen && target && !target.closest(".voice-lang-wrap")) {
                state.voiceLangOpen = false;
                render();
            }
            if (state.voiceCreateLangOpen && target && !target.closest(".voice-create-lang-wrap")) {
                state.voiceCreateLangOpen = false;
                render();
            }
            if (state.scriptFrameworkOpen && target && !target.closest(".script-framework-wrap")) {
                state.scriptFrameworkOpen = false;
                render();
            }
            if (state.assetMenuOpen !== null && target && !target.closest(".asset-library-menu") && !target.closest("[data-toggle-asset-menu]")) {
                state.assetMenuOpen = null;
                render();
            }

            const button = target ? target.closest("button") : null;
            if (!button) return;

            if (button.hasAttribute("data-close-sheet")) {
                closeSheet();
                return;
            }

            if (button.hasAttribute("data-route-direct")) {
                setRoute(button.getAttribute("data-route-direct"));
                return;
            }

            if (button.hasAttribute("data-route")) {
                setRoute(button.getAttribute("data-route"));
                closeSheet();
                return;
            }

            if (button.hasAttribute("data-set-mode")) {
                setHomeMode(button.getAttribute("data-set-mode"));
                return;
            }

            if (button.hasAttribute("data-open-sheet")) {
                const sheetType = button.getAttribute("data-open-sheet");
                const sampleIndex = button.getAttribute("data-sample-index");
                openSheet(sheetType, sampleIndex ? { sampleIndex: Number(sampleIndex) } : {});
                return;
            }

            if (button.hasAttribute("data-toggle-inspiration-filter")) {
                state.inspirationFilterOpen = !state.inspirationFilterOpen;
                render();
                return;
            }

            if (button.hasAttribute("data-pick-inspiration-filter")) {
                state.inspirationFilter = button.getAttribute("data-pick-inspiration-filter");
                state.inspirationFilterOpen = false;
                render();
                return;
            }

            if (button.hasAttribute("data-filter")) {
                state.inspirationFilter = button.getAttribute("data-filter");
                state.inspirationFilterOpen = false;
                render();
                return;
            }

            if (button.hasAttribute("data-home-shortcut")) {
                const shortcut = button.getAttribute("data-home-shortcut");
                if (shortcut === "role") {
                    state.subjectFilter = "character";
                    setRoute("subjects");
                    return;
                }
                if (shortcut === "scene") {
                    state.subjectFilter = "scene";
                    setRoute("subjects");
                    return;
                }
                if (shortcut === "prop") {
                    state.subjectFilter = "prop";
                    state.subjectSelectedIndexes = [];
                    state.subjectBulkMode = false;
                    setRoute("subjects");
                    return;
                }
                if (shortcut === "script") {
                    startCreation();
                    return;
                }
                if (shortcut === "chat") {
                    state.voiceTab = "mine";
                    state.voiceLangOpen = false;
                    state.voiceCreateOpen = true;
                    state.voiceCreateLangOpen = false;
                    setRoute("voices");
                    return;
                }
            }

            if (button.hasAttribute("data-action")) {
                const action = button.getAttribute("data-action");
                if (action === "start-creation") {
                    startCreation();
                    return;
                }
                handleAction(
                    action,
                    button.getAttribute("data-asset-index") ?? button.getAttribute("data-subject-index")
                );
                return;
            }

            if (button.hasAttribute("data-bottom-tab")) {
                handleBottomTab(button.getAttribute("data-bottom-tab"));
                return;
            }

            if (button.hasAttribute("data-assets-mode")) {
                state.assetsMode = button.getAttribute("data-assets-mode");
                state.assetMenuOpen = null;
                render();
                return;
            }

            if (button.hasAttribute("data-toggle-asset-menu")) {
                const index = Number(button.getAttribute("data-toggle-asset-menu"));
                state.assetMenuOpen = state.assetMenuOpen === index ? null : index;
                render();
                return;
            }

            if (button.hasAttribute("data-subject-filter")) {
                state.subjectFilter = button.getAttribute("data-subject-filter");
                state.subjectSelectedIndexes = [];
                state.subjectBulkMode = false;
                render();
                return;
            }

            if (button.hasAttribute("data-voices-tab")) {
                state.voiceTab = button.getAttribute("data-voices-tab");
                render();
                return;
            }

            if (button.hasAttribute("data-toggle-voice-lang")) {
                state.voiceLangOpen = !state.voiceLangOpen;
                render();
                return;
            }

            if (button.hasAttribute("data-pick-voice-lang")) {
                state.voiceLang = button.getAttribute("data-pick-voice-lang");
                state.voiceLangOpen = false;
                render();
                return;
            }

            if (button.hasAttribute("data-toggle-create-voice-lang")) {
                state.voiceCreateLangOpen = !state.voiceCreateLangOpen;
                render();
                return;
            }

            if (button.hasAttribute("data-pick-create-voice-lang")) {
                state.voiceCreateLang = button.getAttribute("data-pick-create-voice-lang");
                state.voiceCreateLangOpen = false;
                render();
                return;
            }

            if (button.hasAttribute("data-pro-step")) {
                state.proStep = button.getAttribute("data-pro-step");
                render();
                return;
            }

            if (button.hasAttribute("data-quick-step")) {
                state.quickStep = button.getAttribute("data-quick-step");
                render();
                return;
            }

            if (button.hasAttribute("data-video-tool")) {
                state.videoTool = button.getAttribute("data-video-tool");
                render();
                return;
            }

            if (button.hasAttribute("data-shot")) {
                state.activeShot = Number(button.getAttribute("data-shot"));
                render();
                return;
            }

            if (button.hasAttribute("data-pick-style")) {
                state.style = button.getAttribute("data-pick-style");
                closeSheet();
                showToast(`已切换风格为「${state.style}」`);
                return;
            }

            if (button.hasAttribute("data-script-style")) {
                state.style = button.getAttribute("data-script-style");
                render();
                return;
            }

            if (button.hasAttribute("data-pick-model")) {
                if (button.disabled) return;
                state.model = button.getAttribute("data-pick-model");
                closeSheet();
                showToast(`已切换模型为「${state.model}」`);
                return;
            }

            if (button.hasAttribute("data-pick-resolution")) {
                state.sheetSpecDraft = {
                    ...getCurrentSpecDraft(),
                    resolution: button.getAttribute("data-pick-resolution")
                };
                render();
                return;
            }

            if (button.hasAttribute("data-pick-ratio")) {
                state.sheetSpecDraft = {
                    ...getCurrentSpecDraft(),
                    ratio: button.getAttribute("data-pick-ratio")
                };
                render();
                return;
            }

            if (button.hasAttribute("data-pick-duration")) {
                state.sheetSpecDraft = {
                    ...getCurrentSpecDraft(),
                    duration: Number(button.getAttribute("data-pick-duration"))
                };
                render();
                return;
            }

            if (button.hasAttribute("data-spec-reset")) {
                resetSpecDraft();
                render();
                return;
            }

            if (button.hasAttribute("data-spec-confirm")) {
                applySpecDraft();
                closeSheet();
                showToast(`已更新规格为「${currentSpecLabel()}」`);
                render();
                return;
            }

            if (button.hasAttribute("data-toggle-subject")) {
                const name = button.getAttribute("data-toggle-subject");
                const exists = state.subjects.includes(name);
                state.subjects = exists
                    ? state.subjects.filter((item) => item !== name)
                    : [...state.subjects, name];
                render();
                return;
            }

            if (button.hasAttribute("data-script-framework-toggle")) {
                state.scriptFrameworkOpen = !state.scriptFrameworkOpen;
                render();
                return;
            }

            if (button.hasAttribute("data-script-framework-pick")) {
                const index = Number(button.getAttribute("data-script-framework-pick"));
                const item = scriptFrameworkPresets[index];
                if (item) {
                    state.scriptDraft = item.text;
                    state.scriptFrameworkOpen = false;
                    render();
                }
                return;
            }
        });

        document.addEventListener("input", (event) => {
            const target = event.target;
            if (target instanceof HTMLInputElement && target.hasAttribute("data-create-voice-name")) {
                state.voiceCreateName = target.value.slice(0, 50);
                const wrap = target.closest(".voice-create-input-wrap");
                const count = wrap && wrap.querySelector(".voice-create-count");
                if (count) count.textContent = `${state.voiceCreateName.length}/50`;
                return;
            }
            if (target instanceof HTMLInputElement && target.hasAttribute("data-spec-duration-slider")) {
                state.sheetSpecDraft = {
                    ...getCurrentSpecDraft(),
                    duration: Number(target.value)
                };
                render();
                return;
            }
            if (!(target instanceof HTMLTextAreaElement)) return;
            if (target.hasAttribute("data-prompt-input")) {
                state.prompt = target.value.slice(0, 100);
                const counter = target.parentElement && target.parentElement.querySelector(".prompt-count");
                if (counter) counter.textContent = `${state.prompt.length}/100`;
                syncSummary();
                return;
            }
            if (target.hasAttribute("data-script-draft-input")) {
                state.scriptDraft = target.value.slice(0, 1000);
                const card = target.closest(".script-editor-card");
                const count = card && card.querySelector(".script-editor-count");
                if (count) count.textContent = `${state.scriptDraft.length}/1000`;
            }
        });

        document.addEventListener("change", (event) => {
            const target = event.target;
            if (!(target instanceof HTMLInputElement)) return;
            if (!target.hasAttribute("data-create-voice-file")) return;
            const file = target.files && target.files[0];
            if (!file) {
                state.voiceCreateFileName = "";
                state.voiceCreateFileSize = "";
                state.voiceCreateFileDuration = "01:26";
                state.voiceCreateFileType = "MP3";
                render();
                return;
            }

            state.voiceCreateFileName = file.name;
            state.voiceCreateFileSize = formatVoiceFileSize(file.size);
            state.voiceCreateFileDuration = "01:26";
            state.voiceCreateFileType = voiceFileTypeLabel(file.name);
            render();

            const audio = document.createElement("audio");
            const objectUrl = URL.createObjectURL(file);
            audio.preload = "metadata";
            audio.src = objectUrl;
            audio.addEventListener("loadedmetadata", () => {
                state.voiceCreateFileDuration = formatVoiceDuration(audio.duration);
                URL.revokeObjectURL(objectUrl);
                render();
            }, { once: true });
            audio.addEventListener("error", () => {
                URL.revokeObjectURL(objectUrl);
            }, { once: true });
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && state.sheet) {
                closeSheet();
            }
        });

        render();
    </script>
</body>
</html>
