<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧本工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg-0: #07031b;
            --bg-1: #110535;
            --card: #212640;
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f5ff;
            --text-sub: #9aa0bf;
            --text-dim: #7d84aa;
            --line: rgba(255, 255, 255, 0.18);
            --pink: #ea59ff;
            --yellow: #f5c96b;
            --sidebar: #232948;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(1200px 700px at -8% -10%, #3b0d67 0%, transparent 58%),
                radial-gradient(880px 560px at 90% 100%, #2a0b56 0%, transparent 62%),
                linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 58%, #07031a 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(1.2px 1.2px at 7% 18%, rgba(255, 255, 255, 0.24), transparent),
                radial-gradient(1.2px 1.2px at 18% 72%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(1.2px 1.2px at 58% 8%, rgba(255, 255, 255, 0.18), transparent),
                radial-gradient(1.2px 1.2px at 79% 48%, rgba(255, 255, 255, 0.18), transparent),
                radial-gradient(1.2px 1.2px at 92% 18%, rgba(255, 255, 255, 0.12), transparent);
            opacity: 0.45;
            z-index: -1;
        }

        .app {
            min-height: 100vh;
            display: flex;
            gap: 26px;
            padding: 24px;
        }

        .sidebar {
            width: 74px;
            flex: 0 0 74px;
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, #2b3153 0%, #222746 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 10px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 12px 36px rgba(0, 0, 0, 0.35);
        }

        .brand {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ffca5d 0%, #ff6b8b 48%, #5f4aff 100%);
            display: grid;
            place-items: center;
            font-size: 21px;
            color: #fff;
            margin-bottom: 18px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            align-items: center;
        }

        .nav-btn {
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 13px;
            color: #9ca3c5;
            background: transparent;
            font-size: 23px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn.active,
        .nav-btn:hover {
            color: #d86bff;
            background: rgba(232, 81, 255, 0.12);
        }

        .sidebar-bottom {
            margin-top: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .coin-row {
            width: 100%;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: #a6adcf;
            font-size: 10px;
            line-height: 1.25;
            font-weight: 500;
        }

        .coin-row .num {
            display: block;
            margin-top: 2px;
            color: #f489e9;
            font-size: 24px;
            line-height: 1;
            font-weight: 700;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.16);
        }

        .workspace {
            flex: 1;
            min-width: 0;
            display: grid;
            grid-template-columns: minmax(760px, 1.55fr) minmax(520px, 1fr);
            gap: 34px;
            align-items: start;
        }

        .left-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 28px 34px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            min-height: calc(100vh - 48px);
        }

        .head-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .head-row h2 {
            margin: 0;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .expand {
            border: 0;
            background: none;
            color: #9ba2c4;
            font-size: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .style-grid {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 18px;
        }

        .style-item {
            border: 0;
            background: none;
            padding: 0;
            text-align: left;
            cursor: pointer;
        }

        .style-thumb {
            width: 100%;
            max-width: 96px;
            aspect-ratio: 1;
            border-radius: 13px;
            border: 2px solid transparent;
            object-fit: cover;
            display: block;
            transition: all 0.2s;
        }

        .style-item.active .style-thumb {
            border-color: #db63ff;
            box-shadow: 0 0 0 2px #f4cb60;
        }

        .style-name {
            margin-top: 8px;
            font-size: 16px;
            color: #bac0de;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .style-item.active .style-name {
            color: #eef1ff;
        }

        .block {
            margin-top: 26px;
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .label-row .label {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .duration-pill {
            min-width: 74px;
            height: 38px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            color: #9ea5c7;
            font-size: 24px;
            font-weight: 700;
        }

        .duration-line {
            margin-top: 10px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
            color: #c2c7df;
            font-size: 30px;
            line-height: 1;
        }

        .duration-line input[type="range"] {
            width: 100%;
            appearance: none;
            background: transparent;
            height: 20px;
            --pct: 0%;
        }

        .duration-line input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 99px;
            background: linear-gradient(90deg, #f6c86b 0%, #e953ff var(--pct), #474f74 var(--pct), #474f74 100%);
        }

        .duration-line input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 17px;
            height: 17px;
            border-radius: 50%;
            margin-top: -6px;
            border: 2px solid #e9d9f7;
            background: #ce58ff;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.12);
        }

        .ratio-row {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }

        .ratio-btn {
            width: 168px;
            height: 54px;
            border-radius: 10px;
            border: 1px solid transparent;
            font-size: 25px;
            font-weight: 700;
            color: #9ca2c4;
            background: #3a3f61;
            cursor: pointer;
        }

        .ratio-btn.active {
            border-color: var(--yellow);
            box-shadow: inset 0 0 0 1px var(--pink);
            color: #ecefff;
            background: #4f3a58;
        }

        .prompt-title {
            margin-top: 22px;
            font-size: 36px;
            font-weight: 700;
        }

        .prompt-box {
            margin-top: 10px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #050319;
            min-height: 332px;
            padding: 22px 24px 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hidden {
            display: none !important;
        }

        .script-bind-panel {
            border: 1px solid rgba(146, 153, 201, 0.18);
            border-radius: 12px;
            background: rgba(28, 30, 56, 0.42);
            padding: 12px 14px;
            margin-bottom: 10px;
        }

        .state-empty-title {
            margin: 0;
            color: #d5dbf8;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.45;
        }

        .state-empty-tip {
            margin: 4px 0 0;
            color: #9198be;
            font-size: 12px;
            line-height: 1.45;
        }

        .uploading-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #d8defb;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .uploading-head .pct {
            color: #f3c86d;
            font-variant-numeric: tabular-nums;
        }

        .upload-progress-track {
            height: 7px;
            border-radius: 99px;
            background: rgba(146, 156, 203, 0.28);
            overflow: hidden;
            margin-bottom: 10px;
        }

        .upload-progress-fill {
            display: block;
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #f6c76f 0%, #ed57ff 100%);
            transition: width 0.15s;
        }

        .skeleton-wrap {
            display: grid;
            gap: 7px;
        }

        .skeleton-line {
            height: 8px;
            border-radius: 6px;
            background: linear-gradient(90deg, rgba(130, 138, 184, 0.2) 10%, rgba(176, 185, 233, 0.5) 45%, rgba(130, 138, 184, 0.2) 85%);
            background-size: 220% 100%;
            animation: shimmer 1.2s linear infinite;
        }

        .w-92 {
            width: 92%;
        }

        .w-78 {
            width: 78%;
        }

        .w-65 {
            width: 65%;
        }

        @keyframes shimmer {
            from {
                background-position: 100% 0;
            }

            to {
                background-position: -100% 0;
            }
        }

        .file-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .file-tag {
            max-width: 100%;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid rgba(235, 86, 255, 0.65);
            background: rgba(123, 74, 156, 0.28);
            color: #e5eaff;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-bind-btn {
            border: 0;
            background: rgba(255, 255, 255, 0.08);
            color: #c3caec;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            min-height: 28px;
            padding: 0 10px;
            cursor: pointer;
        }

        .delete-bind-btn:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .delete-bind-btn:disabled,
        .import-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .prompt-box textarea {
            border: 0;
            width: 100%;
            flex: 1;
            min-height: 190px;
            resize: none;
            background: transparent;
            color: #bec4e2;
            font-size: 33px;
            line-height: 1.45;
            outline: none;
        }

        .prompt-box textarea::placeholder {
            color: #8a91b5;
        }

        .prompt-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .left-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .import-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .import-btn {
            height: 52px;
            border: 1px solid rgba(243, 202, 105, 0.62);
            border-radius: 12px;
            background: rgba(79, 52, 94, 0.4);
            color: #d7dcf8;
            font-size: 25px;
            font-weight: 700;
            padding: 0 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .import-btn:hover {
            background: rgba(111, 72, 130, 0.45);
        }

        .script-hover-tip {
            position: absolute;
            left: 50%;
            bottom: calc(100% + 10px);
            transform: translateX(-50%) translateY(4px);
            border-radius: 13px;
            background: #ffffff;
            color: #1f2338;
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
            padding: 9px 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.18s;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
            z-index: 20;
        }

        .script-hover-tip::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 100%;
            margin-left: -6px;
            border: 6px solid transparent;
            border-top-color: #ffffff;
        }

        .import-wrap:hover .script-hover-tip,
        .import-wrap:focus-within .script-hover-tip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .asset-btn {
            height: 52px;
            border: 0;
            border-radius: 12px;
            background: #43456c;
            color: #b5bcdb;
            font-size: 30px;
            font-weight: 700;
            padding: 0 20px;
        }

        .generate-btn {
            height: 52px;
            border: 0;
            border-radius: 12px;
            padding: 0 22px;
            background: #474781;
            color: #767ca6;
            font-size: 30px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: not-allowed;
        }

        .right-col {
            min-width: 0;
            position: relative;
            padding-top: 2px;
        }

        .right-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .right-head h3 {
            margin: 0;
            font-size: 35px;
            font-weight: 700;
        }

        .guide {
            border: 1px solid rgba(207, 216, 255, 0.45);
            border-radius: 999px;
            height: 42px;
            padding: 0 16px;
            background: linear-gradient(180deg, #a486ff 0%, #6e6de8 100%);
            color: #eef2ff;
            font-size: 20px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .preview {
            position: relative;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        }

        .preview img {
            width: 100%;
            display: block;
            height: auto;
        }

        .play {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 86px;
            height: 86px;
            border-radius: 50%;
            border: 0;
            background: rgba(68, 94, 123, 0.92);
            color: rgba(255, 255, 255, 0.95);
            font-size: 32px;
            display: grid;
            place-items: center;
            z-index: 4;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
        }

        .player-row {
            position: absolute;
            left: 20px;
            right: 20px;
            bottom: 46px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #d4e0f1;
            font-size: 17px;
            font-weight: 600;
            z-index: 4;
        }

        .player-row .time {
            font-size: 33px;
            letter-spacing: 0.2px;
        }

        .player-progress {
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 16px;
            height: 6px;
            border-radius: 99px;
            background: rgba(205, 229, 255, 0.25);
            z-index: 4;
        }

        .player-progress::before {
            content: "";
            position: absolute;
            left: 0;
            top: -3px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #eb49fd;
            box-shadow: 0 0 0 3px rgba(165, 192, 255, 0.32);
        }

        .desc {
            margin: 12px 0 16px;
            color: #b0b6d3;
            font-size: 15px;
            line-height: 1.65;
            letter-spacing: 0.1px;
        }

        .bottom-preview {
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .bottom-preview img {
            width: 100%;
            display: block;
            height: auto;
        }

        .tool-float {
            position: absolute;
            right: -18px;
            top: 46%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-float span {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #d96a9d;
            display: grid;
            place-items: center;
            color: rgba(255, 255, 255, 0.95);
            font-size: 17px;
        }

        @media (max-width: 1600px) {
            .workspace {
                grid-template-columns: minmax(700px, 1.5fr) minmax(460px, 1fr);
                gap: 26px;
            }

            .head-row h2,
            .label-row .label,
            .prompt-title,
            .right-head h3,
            .prompt-box textarea,
            .duration-line,
            .duration-pill,
            .ratio-btn,
            .import-btn,
            .asset-btn,
            .generate-btn {
                zoom: 0.8;
            }

            .style-name {
                font-size: 14px;
            }
        }

        @media (max-width: 1280px) {
            .app {
                padding: 16px;
                gap: 16px;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            .left-card {
                min-height: auto;
            }

            .tool-float {
                display: none;
            }
        }

        @media (max-width: 900px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                justify-content: space-between;
                padding: 10px 14px;
                border-radius: 18px;
            }

            .nav-group {
                flex-direction: row;
                width: auto;
                gap: 6px;
            }

            .sidebar-bottom {
                margin-top: 0;
                flex-direction: row;
                gap: 10px;
            }

            .coin-row {
                border-top: 0;
                padding-top: 0;
                width: auto;
            }

            .style-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .ratio-row {
                flex-wrap: wrap;
            }

            .ratio-btn {
                flex: 1;
                min-width: 132px;
            }

            .prompt-box {
                min-height: 240px;
            }

            .prompt-box textarea {
                min-height: 130px;
            }

            .prompt-actions {
                align-items: flex-end;
                gap: 10px;
            }

            .left-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand"><i class="fa-solid fa-camera-retro"></i></div>

            <div class="nav-group">
                <button class="nav-btn active" aria-label="创作"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                <button class="nav-btn" aria-label="镜头"><i class="fa-solid fa-camera"></i></button>
                <button class="nav-btn" aria-label="角色"><i class="fa-solid fa-face-smile"></i></button>
                <button class="nav-btn" aria-label="资产"><i class="fa-solid fa-address-card"></i></button>
            </div>

            <div class="sidebar-bottom">
                <button class="nav-btn" aria-label="全球"><i class="fa-solid fa-globe"></i></button>
                <div class="coin-row"><span class="num">98155</span>会员有礼</div>
                <img class="avatar" src="./assets/avatar.jpg" alt="avatar">
            </div>
        </aside>

        <section class="workspace">
            <section class="left-card">
                <div class="head-row">
                    <h2>风格</h2>
                    <button class="expand">展开更多 <i class="fa-solid fa-chevron-down"></i></button>
                </div>

                <div class="style-grid">
                    <button class="style-item active" data-style>
                        <img class="style-thumb" src="./assets/style-1.png" alt="日式动漫">
                        <div class="style-name">日式动漫</div>
                    </button>
                    <button class="style-item" data-style>
                        <img class="style-thumb" src="./assets/style-2.png" alt="国风3D">
                        <div class="style-name">国风3D</div>
                    </button>
                    <button class="style-item" data-style>
                        <img class="style-thumb" src="./assets/style-3.png" alt="CG电影">
                        <div class="style-name">CG电影</div>
                    </button>
                    <button class="style-item" data-style>
                        <img class="style-thumb" src="./assets/style-4.png" alt="美式动漫">
                        <div class="style-name">美式动漫</div>
                    </button>
                    <button class="style-item" data-style>
                        <img class="style-thumb" src="./assets/style-5.png" alt="玄幻修仙">
                        <div class="style-name">玄幻修仙</div>
                    </button>
                    <button class="style-item" data-style>
                        <img class="style-thumb" src="./assets/style-6.png" alt="皮克斯风">
                        <div class="style-name">皮克斯风</div>
                    </button>
                </div>

                <div class="block">
                    <div class="label-row">
                        <div class="label">视频时长</div>
                        <span class="duration-pill" id="durationText">00:04</span>
                    </div>
                    <div class="duration-line">
                        <span>00:04</span>
                        <input id="duration" type="range" min="4" max="90" value="4" step="1">
                        <span>01:30</span>
                    </div>
                </div>

                <div class="block">
                    <div class="label-row">
                        <div class="label">视频比例</div>
                    </div>
                    <div class="ratio-row">
                        <button class="ratio-btn active" data-ratio>16:9</button>
                        <button class="ratio-btn" data-ratio>9:16</button>
                    </div>
                </div>

                <div class="prompt-title">分镜内容</div>
                <div class="prompt-box">
                    <div class="script-bind-panel" id="scriptBindPanel">
                        <div id="scriptStateEmpty" class="hidden"></div>

                        <div id="scriptStateUploading" class="hidden">
                            <div class="uploading-head">
                                <span>📎 正在上传并解析剧本...</span>
                                <span class="pct" id="uploadPct">0%</span>
                            </div>
                            <div class="upload-progress-track">
                                <span id="uploadProgressFill" class="upload-progress-fill"></span>
                            </div>
                            <div class="skeleton-wrap">
                                <div class="skeleton-line w-92"></div>
                                <div class="skeleton-line w-78"></div>
                                <div class="skeleton-line w-65"></div>
                            </div>
                        </div>

                        <div id="scriptStateSuccess" class="hidden">
                            <div class="file-row">
                                <span class="file-tag" id="scriptFileTag">📄 绝世仙尊剧本.docx</span>
                                <button class="delete-bind-btn" id="deleteScriptBtn" type="button">🗑️删除</button>
                            </div>
                        </div>
                    </div>

                    <textarea id="promptInput" placeholder="请输入您想要生成的内容，例如：一个勇敢的女孩在未来城市中冒险。"></textarea>
                    <div class="prompt-actions">
                        <div class="left-actions">
                            <div class="import-wrap">
                                <button class="import-btn" id="importScriptBtn" type="button">📎 剧本</button>
                                <span class="script-hover-tip">支持txt.docx.excel.pdf.md，限5000字</span>
                                <input id="scriptFileInput" type="file" class="hidden" accept=".txt,.docx,.excel,.xls,.xlsx,.pdf,.md">
                            </div>
                            <button class="asset-btn" type="button"><i class="fa-solid fa-plus"></i> 主体</button>
                        </div>
                        <button class="generate-btn"><i class="fa-solid fa-child-reaching"></i> 动画生成</button>
                    </div>
                </div>
            </section>

            <section class="right-col">
                <div class="right-head">
                    <h3>灵感</h3>
                    <button class="guide"><i class="fa-regular fa-circle-question"></i> 新手指引</button>
                </div>

                <div class="preview">
                    <img src="./assets/inspiration-top.png" alt="灵感视频封面">
                    <button class="play" aria-label="播放"><i class="fa-solid fa-play"></i></button>
                    <div class="player-row">
                        <i class="fa-solid fa-volume-high"></i>
                        <span class="time">00:00 / 00:00</span>
                    </div>
                    <div class="player-progress"></div>
                </div>

                <p class="desc">男孩在月光下跪下，拾起一枚发着光的玉符，蓝色灵力在周围盘旋，萤火虫在空中飘散；背景是古老的森林，光影戏剧化；画风为中国玄幻动漫风格，带有仙侠般的灵气特效；</p>

                <div class="bottom-preview">
                    <img src="./assets/inspiration-bottom.png" alt="灵感示例">
                </div>

                <div class="tool-float" aria-hidden="true">
                    <span><i class="fa-solid fa-table-cells"></i></span>
                    <span><i class="fa-solid fa-language"></i></span>
                </div>
            </section>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const slider = document.getElementById('duration');
        const durationText = document.getElementById('durationText');
        const promptInput = document.getElementById('promptInput');

        const importScriptBtn = document.getElementById('importScriptBtn');
        const scriptFileInput = document.getElementById('scriptFileInput');
        const deleteScriptBtn = document.getElementById('deleteScriptBtn');
        const scriptBindPanel = document.getElementById('scriptBindPanel');
        const scriptStateEmpty = document.getElementById('scriptStateEmpty');
        const scriptStateUploading = document.getElementById('scriptStateUploading');
        const scriptStateSuccess = document.getElementById('scriptStateSuccess');
        const uploadPct = document.getElementById('uploadPct');
        const uploadProgressFill = document.getElementById('uploadProgressFill');
        const scriptFileTag = document.getElementById('scriptFileTag');

        const SUPPORT_EXT = new Set(['docx', 'excel', 'xls', 'xlsx', 'pdf', 'txt', 'md']);
        const EXCEL_REQUIRED_HEADERS = ['场景', '分镜内容', '角色', '对白'];
        let uploadTimer = null;
        let importedPreview = '';

        function formatDuration(totalSec) {
            const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
            const sec = String(totalSec % 60).padStart(2, '0');
            return `${min}:${sec}`;
        }

        function updateSliderFill() {
            const min = Number(slider.min);
            const max = Number(slider.max);
            const val = Number(slider.value);
            const pct = ((val - min) / (max - min)) * 100;
            slider.style.setProperty('--pct', `${pct}%`);
            durationText.textContent = formatDuration(val);
        }

        updateSliderFill();
        slider.addEventListener('input', updateSliderFill);

        document.querySelectorAll('[data-style]').forEach((btn) => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-style]').forEach((node) => node.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        document.querySelectorAll('[data-ratio]').forEach((btn) => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-ratio]').forEach((node) => node.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        function setScriptState(state) {
            scriptBindPanel.classList.toggle('hidden', state === 'empty');
            if (scriptStateEmpty) {
                scriptStateEmpty.classList.toggle('hidden', true);
            }
            scriptStateUploading.classList.toggle('hidden', state !== 'uploading');
            scriptStateSuccess.classList.toggle('hidden', state !== 'success');
            importScriptBtn.disabled = state === 'uploading';
            deleteScriptBtn.disabled = state === 'uploading';
        }

        function normalizeText(raw) {
            return (raw || '').replace(/\s+/g, ' ').trim();
        }

        function normalizeHeaderCell(raw) {
            return String(raw || '').replace(/\s+/g, '').trim();
        }

        function getExt(fileName) {
            const parts = fileName.split('.');
            return parts.length > 1 ? parts.pop().toLowerCase() : '';
        }

        function toPreview100(text) {
            const normalized = normalizeText(text);
            if (!normalized) return '';
            return normalized.length <= 100 ? normalized : `${normalized.slice(0, 100)}...`;
        }

        function mockParsedSummary(fileName) {
            return `主角在夜色森林中拾起发光玉符，灵力瞬间觉醒并引来追兵。故事节奏从悬念铺垫快速切入高能冲突，适合拆分为“异象出现-能力爆发-正反对峙”三段分镜，文件来源：${fileName}。`;
        }

        function parseScriptPreview(file) {
            const ext = getExt(file.name);
            return new Promise((resolve) => {
                if (ext === 'txt' || ext === 'md') {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const content = typeof reader.result === 'string' ? reader.result : '';
                        const normalized = normalizeText(content);
                        resolve(normalized || mockParsedSummary(file.name));
                    };
                    reader.onerror = () => resolve(mockParsedSummary(file.name));
                    reader.readAsText(file, 'utf-8');
                    return;
                }
                resolve(mockParsedSummary(file.name));
            });
        }

        function readTextFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(typeof reader.result === 'string' ? reader.result : '');
                reader.onerror = () => reject(new Error('read_text_failed'));
                reader.readAsText(file, 'utf-8');
            });
        }

        function readArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('read_binary_failed'));
                reader.readAsArrayBuffer(file);
            });
        }

        function isExcelExt(ext) {
            return ext === 'excel' || ext === 'xls' || ext === 'xlsx';
        }

        async function validateExcelHeader(file) {
            const ext = getExt(file.name);
            if (!isExcelExt(ext)) return true;

            if (!window.XLSX) {
                alert('Excel解析组件加载失败，请刷新页面后重试。');
                return false;
            }

            try {
                const binary = await readArrayBuffer(file);
                const workbook = window.XLSX.read(binary, { type: 'array' });
                const firstSheetName = workbook.SheetNames && workbook.SheetNames[0];
                if (!firstSheetName) {
                    alert('Excel为空文件，请检查后重新上传。');
                    return false;
                }

                const sheet = workbook.Sheets[firstSheetName];
                const rows = window.XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: '' });
                const firstRow = (rows[0] || []).map(normalizeHeaderCell);
                const required = EXCEL_REQUIRED_HEADERS.map(normalizeHeaderCell);

                const headerMatched = required.every((item, index) => firstRow[index] === item);
                if (!headerMatched) {
                    alert(`Excel首行表头不符合模板，请按顺序填写：${EXCEL_REQUIRED_HEADERS.join('、')}`);
                    return false;
                }

                return true;
            } catch (err) {
                alert('Excel解析失败，请确认文件为有效的 xls/xlsx 格式。');
                return false;
            }
        }

        async function validateScriptWordLimit(file) {
            const ext = getExt(file.name);
            if (ext !== 'txt' && ext !== 'md') return true;

            try {
                const content = await readTextFile(file);
                const textLength = normalizeText(content).length;
                if (textLength > 5000) {
                    alert('剧本文本超过5000字，请拆分后上传。');
                    return false;
                }
                return true;
            } catch (err) {
                alert('文本读取失败，请重试上传。');
                return false;
            }
        }

        function setUploadProgress(progress) {
            uploadPct.textContent = `${progress}%`;
            uploadProgressFill.style.width = `${progress}%`;
        }

        function clearUploadTimer() {
            if (!uploadTimer) return;
            clearInterval(uploadTimer);
            uploadTimer = null;
        }

        function resetScriptBinding() {
            clearUploadTimer();
            scriptFileInput.value = '';
            scriptFileTag.textContent = '📄 未绑定剧本';
            importedPreview = '';
            setUploadProgress(0);
            setScriptState('empty');
        }

        async function startUploadFlow(file) {
            clearUploadTimer();
            setScriptState('uploading');
            setUploadProgress(0);

            let progress = 0;
            uploadTimer = setInterval(async () => {
                progress += Math.floor(Math.random() * 14) + 8;
                if (progress >= 100) {
                    progress = 100;
                    setUploadProgress(progress);
                    clearUploadTimer();

                    const parsedRaw = await parseScriptPreview(file);
                    const preview100 = toPreview100(parsedRaw);
                    importedPreview = preview100;
                    scriptFileTag.textContent = `📄 ${file.name}`;

                    if (!promptInput.value.trim()) {
                        promptInput.value = preview100;
                    }

                    setScriptState('success');
                    return;
                }

                setUploadProgress(progress);
            }, 180);
        }

        importScriptBtn.addEventListener('click', () => {
            scriptFileInput.click();
        });

        scriptFileInput.addEventListener('change', async () => {
            const file = scriptFileInput.files && scriptFileInput.files[0];
            if (!file) return;

            const ext = getExt(file.name);
            if (!SUPPORT_EXT.has(ext)) {
                alert('仅支持 txt / docx / excel / pdf / md 格式');
                scriptFileInput.value = '';
                return;
            }

            const validWordLimit = await validateScriptWordLimit(file);
            if (!validWordLimit) {
                scriptFileInput.value = '';
                return;
            }

            const validExcelHeader = await validateExcelHeader(file);
            if (!validExcelHeader) {
                scriptFileInput.value = '';
                return;
            }

            startUploadFlow(file);
        });

        deleteScriptBtn.addEventListener('click', () => {
            const current = normalizeText(promptInput.value);
            if (importedPreview && current === importedPreview) {
                promptInput.value = '';
            }
            resetScriptBinding();
        });

        setScriptState('empty');
    </script>
</body>
</html>
